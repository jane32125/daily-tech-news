name: Update News Website
on:
  schedule:
    - cron: '0 0 * * *' # 每天台灣時間 08:00 自動執行
  workflow_dispatch:      # 允許手動點擊按鈕測試

jobs:
  build:
    runs-on: ubuntu-latest
    # 這三行非常重要：賦予機器人寫入檔案並發佈網頁的權限
    permissions:
      contents: write
      pages: write
      id-token: write
      
    steps:
      # 1. 檢查程式碼 (升級至 v4，支援 Node.js 20+)
      - uses: actions/checkout@v4
      
      # 2. 設定 Python 環境 (升級至 v5)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      # 3. 安裝需要的爬蟲套件
      - name: Install dependencies
        run: pip install feedparser
        
      # 4. 執行你的 Python 抓取腳本
      - name: Run script
        run: python fetch_news.py
        
      # 5. 將產生的 index.html 發佈到 GitHub Pages (升級至 v4)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
